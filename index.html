<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      (function() {
        var currentFetch = window.fetch;
        function patchFetch(obj) {
          if (!obj) return;
          try {
            var desc = Object.getOwnPropertyDescriptor(obj, 'fetch');
            if (!desc || desc.configurable) {
              Object.defineProperty(obj, 'fetch', {
                get: function() {
                  return currentFetch;
                },
                set: function(newFetch) {
                  currentFetch = newFetch;
                },
                configurable: true,
                enumerable: true
              });
            }
          } catch (e) {
            // Safe fall-back
          }
        }
        patchFetch(window);
        patchFetch(globalThis);
        patchFetch(self);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
